name: NuraWell Daily AI Cron

on:
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger NuraWell AI Cron
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Length: 0" \
            "${{ secrets.VERCEL_APP_URL }}/api/v1/ai/cron/master")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cron failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Cron completed successfully"
